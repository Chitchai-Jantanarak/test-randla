# RandLA-Net config with BEV feature injection (11 input channels)
# Use this config when running with --bev flag
# Original 6 channels (xyz+rgb) + 5 BEV channels (density, height_above_ground,
# height_range, height_mean, height_std)

dataset:
  name: Toronto3D
  cache_dir: ./logs/cache
  dataset_path:
  class_weights: [41697357, 1745448, 6572572, 19136493, 674897, 897825, 4634634, 374721]
  ignored_label_inds:
    - 0
  num_classes: 8
  num_points: 65536
  test_files:
    - L002.ply
  test_result_folder: ./test
  train_files:
    - L001.ply
    - L003.ply
    - L004.ply
  use_cache: true
  val_files:
    - L002.ply
  steps_per_epoch_train: 100
  steps_per_epoch_valid: 10

model:
  name: RandLANet
  batcher: DefaultBatcher
  ckpt_path:
  num_neighbors: 16
  num_layers: 5
  num_points: 65536
  num_classes: 8
  ignored_label_inds: [0]
  sub_sampling_ratio: [4, 4, 4, 4, 2]
  in_channels: 11          # 6 (xyz+rgb) + 5 (BEV features)
  dim_features: 8
  dim_output: [16, 64, 128, 256, 512]
  grid_size: 0.05
  augment:
    recenter:
      dim: [0, 1, 2]
    normalize:
      points:
        method: linear

pipeline:
  name: SemanticSegmentation
  optimizer:
    lr: 0.0005             # lower LR for fine-tuning
  batch_size: 2
  main_log_dir: ./logs
  max_epoch: 100           # fewer epochs for fine-tuning
  save_ckpt_freq: 5
  scheduler_gamma: 0.99
  test_batch_size: 1
  train_sum_dir: train_log
  val_batch_size: 2
  summary:
    record_for: []
    max_pts:
    use_reference: false
    max_outputs: 1
